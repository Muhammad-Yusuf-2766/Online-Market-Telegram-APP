# Test Postgres for API e2e tests (port 5433 to avoid clashing with dev db on 5432).
# Usage: docker compose -f docker/docker-compose.test.yml up -d
services:
  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: parfumbox_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
