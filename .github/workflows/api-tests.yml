name: api-tests

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/api-tests.yml"
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: parfumbox_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      E2E_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/parfumbox_test?schema=public
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/parfumbox_test?schema=public
      JWT_SECRET: ci-jwt-secret
      ADMIN_JWT_SECRET: ci-admin-jwt-secret
      TELEGRAM_BOT_TOKEN: ci-bot-token

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter api exec prisma generate

      - run: pnpm --filter api exec prisma migrate deploy

      - run: pnpm --filter api test:cov

      - run: pnpm --filter api test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage
          path: apps/api/coverage
