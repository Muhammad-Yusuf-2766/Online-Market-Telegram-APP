name: deploy-prod

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ansor-market-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, ansor-market-prod]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and deploy Docker Compose
        run: |
          export GIT_SHA="${GITHUB_SHA}"
          export BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          docker compose \
            --env-file /opt/ansor-market/env/compose.env \
            -f docker-compose.prod.yml \
            build --pull

          docker compose \
            --env-file /opt/ansor-market/env/compose.env \
            -f docker-compose.prod.yml \
            up -d --remove-orphans

      - name: Cleanup old Docker images
        run: docker image prune -f
