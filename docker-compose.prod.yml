services:
  db:
    image: postgres:16-alpine
    container_name: ansor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - /opt/ansor-market/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: ansor-api
    restart: unless-stopped
    env_file:
      - /opt/ansor-market/env/api.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      NODE_ENV: production
      PORT: '3000'
      RUN_DB_SEED: 'false'
    volumes:
      - /opt/ansor-market/uploads:/app/apps/api/uploads
    ports:
      - '127.0.0.1:3000:3000'
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${PUBLIC_API_URL}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: ansor-web
    restart: unless-stopped
    ports:
      - '127.0.0.1:8080:80'
    depends_on:
      - api

  admin:
    build:
      context: .
      dockerfile: docker/admin/Dockerfile
      args:
        VITE_API_BASE_URL: ${PUBLIC_API_URL}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: ansor-admin
    restart: unless-stopped
    ports:
      - '127.0.0.1:8081:80'
    depends_on:
      - api
